<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kotoba's Island</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --theme: #59b9c6; --bg: #eaedf7; --font-jp: 'Noto Serif JP', serif; }
        body { font-family: 'Playfair Display', var(--font-jp); background: var(--bg); color: var(--theme); height: 100vh; overflow: hidden; font-weight: 400; }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(89, 185, 198, 0.15); border-radius: 2rem; }
        .card { background: rgba(255, 255, 255, 0.9); border-radius: 1.5rem; transition: all 0.3s ease; border: 1px solid rgba(89, 185, 198, 0.1); }
        
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(89, 185, 198, 0.2); border-radius: 10px; }

        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            .main-container { flex-direction: column; height: auto; padding: 1rem; gap: 1rem; }
            aside, main { width: 100% !important; height: auto !important; }
            .view-section { min-height: 500px; }
        }

        .nav-link { opacity: 0.4; transition: 0.3s; }
        .nav-active { color: var(--theme); border-right: 2px solid var(--theme); opacity: 1 !important; }
        .level-btn.active { background: var(--theme); color: white; }
        
        .record-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid currentColor; font-weight: 300; }
        .btn-primary { border: 1px solid var(--theme); color: var(--theme); border-radius: 999px; transition: 0.3s; background: transparent; font-weight: 400; }
        .btn-primary:hover { background: var(--theme); color: white; }
        
        input { color: var(--theme); font-weight: 300; }
        input::placeholder { color: var(--theme); opacity: 0.3; }
        .font-jp { font-family: var(--font-jp); font-weight: 300; }
        ruby rt { color: #888; font-weight: 300; font-size: 0.6em; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="main-container relative z-10 w-full h-full max-w-[1800px] flex p-6 gap-6">

        <aside class="w-[220px] flex-shrink-0 flex flex-col gap-10 glass p-8 h-full hidden lg:flex">
            <div class="flex items-center gap-3">
                <i data-lucide="sparkle" class="w-5 h-5"></i>
                <h1 class="text-xl italic">Kotoba's</h1>
            </div>
            <nav class="flex flex-col gap-6">
                <div onclick="switchView('map-view', this)" class="nav-link flex items-center gap-4 cursor-pointer nav-active"><i data-lucide="sparkle" class="w-4 h-4"></i> Discovery</div>
                <div onclick="switchView('idea-view', this)" class="nav-link flex items-center gap-4 cursor-pointer"><i data-lucide="sparkle" class="w-4 h-4"></i> Inspiration</div>
                <div onclick="switchView('quiz-view', this)" class="nav-link flex items-center gap-4 cursor-pointer"><i data-lucide="sparkle" class="w-4 h-4"></i> Challenge</div>
            </nav>
            <div class="mt-auto">
                <input id="api-key" type="password" placeholder="Input your key..." onchange="localStorage.setItem('ds_key', this.value)" 
                       class="w-full bg-white/40 rounded-xl px-4 py-2 text-xs outline-none border border-transparent focus:border-[#59b9c6]/20">
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full glass overflow-hidden border-none">
            
            <section id="map-view" class="view-section active p-8 flex flex-col h-full">
                <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-10">
                    <div><h2 class="text-4xl italic mb-1">Discovery</h2><p class="opacity-40 text-[10px] font-jp tracking-widest uppercase">Explore the connections</p></div>
                    <div class="relative w-full md:w-72">
                        <i data-lucide="sparkle" class="absolute left-4 top-1/2 -translate-y-1/2 w-3 h-3 opacity-30"></i>
                        <input id="search-in" type="text" placeholder="Explore word..." onkeypress="if(event.key==='Enter') searchWord()" 
                               class="w-full bg-white/50 border border-[#59b9c6]/10 rounded-2xl pl-10 pr-4 py-3 text-sm outline-none focus:bg-white transition-all">
                    </div>
                </header>
                <div class="flex-1 overflow-y-auto custom-scroll pr-2">
                    <div id="nodes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    <div id="example-area" class="mt-10 space-y-6"></div>
                </div>
            </section>

            <section id="idea-view" class="view-section hidden p-10 flex flex-col items-center justify-center h-full text-center">
                <i data-lucide="sparkle" class="w-8 h-8 mb-6 opacity-20"></i>
                <h2 class="text-5xl italic mb-12">Inspiration</h2>
                <div class="flex gap-4 mb-10">
                    <button onclick="selectType(this, 'Vocabulary')" class="type-btn px-8 py-2 rounded-full border border-[#59b9c6]/20 text-xs bg-[#59b9c6] text-white">語彙</button>
                    <button onclick="selectType(this, 'Grammar')" class="type-btn px-8 py-2 rounded-full border border-[#59b9c6]/20 text-xs">文法</button>
                    <button onclick="selectType(this, 'Culture')" class="type-btn px-8 py-2 rounded-full border border-[#59b9c6]/20 text-xs">文化</button>
                </div>
                <button onclick="getIdea()" id="idea-btn" class="btn-primary px-16 py-3 text-[10px] tracking-widest uppercase mb-12">Seek</button>
                <div id="idea-res" class="hidden animate-fade-in">
                    <div id="idea-word" onclick="searchWord(this.innerText)" class="text-4xl font-jp border-b border-[#59b9c6]/30 pb-2 cursor-pointer hover:opacity-50 transition-all inline-block">...</div>
                </div>
            </section>

            <section id="quiz-view" class="view-section hidden p-8 flex flex-col h-full">
                <header class="mb-10 flex flex-col gap-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-4xl italic">Challenge</h2>
                        <button onclick="getQuiz()" id="quiz-btn" class="btn-primary px-8 py-2 text-[10px] uppercase">New Task</button>
                    </div>
                    <div class="flex flex-wrap gap-4 items-center border-b border-[#59b9c6]/10 pb-6">
                        <div class="flex gap-2" id="lv-selector">
                            <button onclick="currentLv='N5'; updateLvUI(this)" class="level-btn w-10 h-10 rounded-full border border-[#59b9c6]/10 text-[10px]">N5</button>
                            <button onclick="currentLv='N4'; updateLvUI(this)" class="level-btn w-10 h-10 rounded-full border border-[#59b9c6]/10 text-[10px]">N4</button>
                            <button onclick="currentLv='N3'; updateLvUI(this)" class="level-btn w-10 h-10 rounded-full border border-[#59b9c6]/10 text-[10px]">N3</button>
                            <button onclick="currentLv='N2'; updateLvUI(this)" class="level-btn w-10 h-10 rounded-full border border-[#59b9c6]/10 text-[10px] active">N2</button>
                            <button onclick="currentLv='N1'; updateLvUI(this)" class="level-btn w-10 h-10 rounded-full border border-[#59b9c6]/10 text-[10px]">N1</button>
                        </div>
                        <select id="quiz-type" class="ml-auto bg-transparent text-[10px] uppercase outline-none font-jp opacity-60">
                            <option value="Vocabulary">語彙</option><option value="Grammar">文法</option><option value="Culture">文化</option>
                        </select>
                    </div>
                </header>
                <div id="quiz-container" class="flex-1 overflow-y-auto custom-scroll space-y-8 pb-10"></div>
            </section>
        </main>

        <aside class="w-[280px] flex-shrink-0 flex flex-col glass p-8 h-full border-none hidden xl:flex">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-2 text-xs opacity-50 uppercase tracking-widest"><i data-lucide="sparkle" class="w-3 h-3"></i> Records</div>
                <button onclick="exportTxt()" class="hover:opacity-50 transition-all"><i data-lucide="sparkle" class="w-4 h-4"></i></button>
            </div>
            <div id="record-list" class="flex-1 overflow-y-auto custom-scroll space-y-6"></div>
            <button onclick="clearSession()" class="mt-8 text-[9px] uppercase tracking-widest opacity-20 hover:opacity-100 text-center">Reset Session</button>
        </aside>

    </div>

    <script>
        lucide.createIcons();
        let sessionData = []; let used = new Set();
        let currentLv = "N2"; let currentType = "Vocabulary";

        const apiKey = () => document.getElementById('api-key').value || localStorage.getItem('ds_key');

        function switchView(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
            el.classList.add('nav-active');
        }

        function updateLvUI(btn) {
            document.querySelectorAll('#lv-selector button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function selectType(btn, t) {
            currentType = t;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('bg-[#59b9c6]', 'text-white'));
            btn.classList.add('bg-[#59b9c6]', 'text-white');
        }

        async function ai(prompt) {
            if(!apiKey()) return alert("API Key required");
            try {
                const r = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey()}`},
                    body: JSON.stringify({ model: "deepseek-chat", messages: [{role: "system", content: prompt}], response_format: {type: "json_object"}})
                });
                const d = await r.json();
                return JSON.parse(d.choices[0].message.content);
            } catch(e) { return null; }
        }

        function addRec(type, content) {
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            sessionData.push({time, type, content});
            const list = document.getElementById('record-list');
            const div = document.createElement('div');
            div.className = "text-[11px] border-l border-[#59b9c6]/20 pl-4 py-1 animate-fade-in";
            div.innerHTML = `<div class="record-tag mb-2 inline-block scale-75 origin-left opacity-60">${type}</div>
                             <div class="font-jp opacity-70 leading-relaxed">${content}</div>`;
            list.prepend(div);
        }

        async function searchWord(w) {
            const q = w || document.getElementById('search-in').value; if(!q) return;
            const res = await ai(`JSON. 6 words related to "${q}". {"c":{"w":"Kanji","r":"Reading","m":"Meaning"},"ext":[{"w":"Kanji","r":"Reading","m":"Meaning"}]}`);
            if(!res) return;
            const grid = document.getElementById('nodes-grid'); grid.innerHTML = '';
            [res.c, ...res.ext].forEach(n => {
                const div = document.createElement('div');
                div.className = "card p-6 cursor-pointer hover:border-[#59b9c6]/30 relative group";
                div.onclick = () => searchWord(n.w);
                div.innerHTML = `<div class="absolute right-4 top-4 opacity-0 group-hover:opacity-40" onclick="event.stopPropagation(); getExample('${n.w}')"><i data-lucide="sparkle" class="w-3 h-3"></i></div>
                                 <div class="font-jp text-xl mb-1"><ruby>${n.w}<rt>${n.r}</rt></ruby></div>
                                 <p class="text-[10px] opacity-30 font-jp tracking-wider">${n.m}</p>`;
                grid.appendChild(div);
            });
            lucide.createIcons(); addRec("Discovery", res.c.w);
        }

        async function getExample(w) {
            const res = await ai(`JSON. N1 sentence for "${w}". {"jp":"...","zh":"..."}`); if(!res) return;
            const div = document.createElement('div');
            div.className = "card p-8 border-dashed border-[#59b9c6]/20 text-center animate-slide-up";
            div.innerHTML = `<p class="font-jp text-lg mb-2 text-[#444]">${res.jp}</p><p class="text-[10px] opacity-30 italic font-jp">${res.zh}</p>`;
            document.getElementById('example-area').prepend(div);
        }

        async function getIdea() {
            const res = await ai(`JSON. Specific Japanese ${currentType} topic in Japanese. {"word":"..."}`);
            if(res) { document.getElementById('idea-word').innerText = res.word; document.getElementById('idea-res').classList.remove('hidden'); addRec("Inspiration", res.word); }
        }

        async function getQuiz() {
            const type = document.getElementById('quiz-type').value;
            const res = await ai(`JSON. JLPT ${currentLv} quiz for ${type}. Use "[BLANK]". {"q":"Sentence with [BLANK]","h":"Hint","a":"CorrectAnswer","r":"<ruby>Ans<rt>...</rt></ruby>"}`);
            if(!res || used.has(res.a)) return getQuiz(); used.add(res.a);
            const id = Date.now();
            const qHtml = res.q.replace('[BLANK]', `<input id="in-${id}" class="mx-2 w-28 border-b border-[#59b9c6]/40 bg-transparent text-center outline-none focus:border-b-2 transition-all font-jp" placeholder="?">`);
            const div = document.createElement('div');
            div.className = "card p-12 relative overflow-hidden";
            div.innerHTML = `<div class="absolute right-6 top-6 opacity-20 text-[10px] tracking-widest">${currentLv}</div>
                             <div class="text-2xl font-jp mb-10 leading-relaxed text-center text-[#444]">${qHtml}</div>
                             <div class="flex justify-center flex-col items-center gap-6">
                                <button onclick="evalQuiz('${id}','${res.a}','${res.r.replace(/'/g,"\\'")}')" class="btn-primary px-12 py-2 text-[10px] tracking-widest uppercase">Evaluate</button>
                                <div id="res-${id}" class="hidden text-center font-jp animate-fade-in pt-4"></div>
                             </div>`;
            document.getElementById('quiz-container').prepend(div);
            addRec("Challenge", `${currentLv} Task`);
        }

        function evalQuiz(id, ans, ruby) {
            const val = document.getElementById(`in-${id}`).value.trim(); const box = document.getElementById(`res-${id}`);
            box.innerHTML = (val === ans) ? `<div class="text-[#59b9c6] text-xl">${ruby}</div>` : `<div class="opacity-30 text-[10px] italic">Try again...</div>`;
            box.classList.remove('hidden');
        }

        function exportTxt() {
            if(sessionData.length === 0) return;
            const content = sessionData.map(d => `[${d.time}] ${d.type}: ${d.content}`).join('\n');
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Session_Log.txt`; a.click();
        }

        function clearSession() { document.getElementById('record-list').innerHTML=''; sessionData=[]; }
    </script>
</body>
</html>
