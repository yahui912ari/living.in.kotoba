<html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kotoba's Island</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --theme: #badcad; --bg-base: #f0f7ff; --font-jp: 'Noto Serif JP', serif; --font-en: 'Playfair Display', serif; --dark-text: #474a4d; }
        
        body { 
            font-family: var(--font-en), var(--font-jp); 
            background-color: var(--bg-base); 
            color: var(--dark-text); 
            min-height: 100vh; 
            font-style: italic; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Ensure all Japanese stays normal but UI English stays italic */
        .font-jp, [lang="ja"], ruby { font-family: var(--font-jp) !important; font-style: normal; }
        .italic-ui { font-style: italic; color: var(--dark-text); }
        .italic-title { font-style: italic; font-weight: 500; color: var(--dark-text); }
        
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #f0f7ff 0%, #e2e8f0 100%); overflow: hidden; }
        .blob-1 { position: absolute; top: -10%; left: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(186, 220, 173, 0.2) 0%, rgba(186, 220, 173, 0) 70%); border-radius: 50%; filter: blur(40px); animation: float 15s ease-in-out infinite; }
        .blob-2 { position: absolute; bottom: 10%; right: -20%; width: 80vw; height: 80vw; background: radial-gradient(circle, rgba(147, 197, 253, 0.2) 0%, rgba(147, 197, 253, 0) 70%); border-radius: 50%; filter: blur(50px); animation: float 18s ease-in-out infinite reverse; }
        
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -30px); } }
        
        .glass-panel { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(147, 197, 253, 0.4); border-radius: 2rem; }
        .glass-card { background: rgba(255, 255, 255, 0.8); border-radius: 1.5rem; border: 1px solid rgba(147, 197, 253, 0.3); transition: all 0.3s; font-style: italic; }
        .glass-header { background: rgba(240, 247, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(147, 197, 253, 0.3); }
        
        .inner-scroll { overflow-y: auto; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 0px; }
        
        input { outline: none; background: transparent; font-style: italic; color: var(--dark-text); }
        .level-btn { transition: all 0.3s; background: rgba(255,255,255,0.5); border: 1px solid rgba(147, 197, 253, 0.4); color: #64748b; font-size: 10px; padding: 4px 12px; border-radius: 99px; font-style: italic; }
        .level-btn.active { background: var(--theme); color: white; border-color: var(--theme); }
        
        ruby rt { font-size: 0.6em; color: #94a3b8; font-style: normal; }
        .animate-fade-in { animation: fade-in 0.5s ease forwards; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="w-full h-full flex flex-col relative">
    <div class="bg-blobs"><div class="blob-1"></div><div class="blob-2"></div></div>

    <header class="glass-header sticky top-0 z-50 px-6 py-4 pt-12 flex justify-between items-center rounded-b-[2.5rem]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center border border-blue-200"><i data-lucide="sparkle" class="w-4 h-4 text-[#badcad]"></i></div>
            <h1 class="text-xl italic-title">Kotoba</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="relative flex items-center bg-white/60 px-3 py-2 rounded-full border border-blue-200">
                <i data-lucide="key" class="w-3 h-3 text-blue-400 mr-2 opacity-60"></i>
                <input id="api-key" type="password" placeholder="API Key" onchange="localStorage.setItem('ds_key', this.value)" class="w-16 text-[10px] sm:w-20 italic">
            </div>
            <button onclick="resetMemory()" class="w-8 h-8 rounded-full bg-white/60 flex items-center justify-center border border-blue-200 text-slate-400 hover:rotate-180 transition-all"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
        </div>
    </header>

    <main class="flex-1 px-5 pt-6 pb-28 space-y-6 relative z-10 w-full max-w-md mx-auto">
        <section class="glass-panel flex flex-col overflow-hidden max-h-[550px]">
            <div class="p-6 pb-4 flex justify-between items-center">
                <div class="flex items-center gap-2"><h2 class="text-2xl italic-title">Discovery</h2><i data-lucide="sparkle" class="w-3.5 h-3.5 opacity-30 text-blue-400"></i></div>
            </div>
            <div class="px-6 mb-2">
                <div class="bg-white/80 border border-blue-200 rounded-2xl p-1 flex items-center">
                    <i data-lucide="search" class="w-4 h-4 ml-3 opacity-30 text-blue-400"></i>
                    <input id="search-in" type="text" placeholder="Explore semantic web..." onkeypress="if(event.key==='Enter') searchWord()" class="w-full text-sm px-3 py-2 font-jp italic">
                </div>
            </div>
            <div class="flex-1 overflow-y-auto inner-scroll px-6 pb-6" id="discovery-scroll">
                <div id="nodes-grid" class="grid grid-cols-1 gap-3 font-jp"></div>
                <div id="example-area" class="pt-4 font-jp"></div>
            </div>
        </section>

        <section class="glass-panel flex flex-col relative overflow-hidden">
            <div class="p-6 pb-2 flex justify-between items-center">
                <div class="flex items-center gap-2"><h2 class="text-2xl italic-title">Inspiration</h2><i data-lucide="sparkle" class="w-3.5 h-3.5 opacity-30 text-blue-400"></i></div>
            </div>
            <div class="p-6 pt-4 flex flex-col items-center text-center gap-6">
                <button onclick="getIdea()" id="idea-btn" class="group relative w-20 h-20 rounded-full flex items-center justify-center">
                    <div class="absolute inset-0 bg-white/60 rounded-full border border-blue-300 shadow-lg backdrop-blur-md flex items-center justify-center group-active:scale-95 transition-all">
                        <div class="w-14 h-14 rounded-full border border-blue-200 bg-gradient-to-br from-blue-50 flex items-center justify-center">
                            <i data-lucide="sparkle" id="idea-icon" class="w-6 h-6 text-[#badcad]"></i>
                        </div>
                    </div>
                </button>
                <div id="idea-res" class="hidden animate-fade-in w-full text-left">
                    <div class="glass-card p-5 border-dashed border-blue-200 border-2 cursor-pointer" id="idea-card-node">
                        <div id="idea-word" class="text-lg font-jp text-blue-500 mb-2">
                            <span id="idea-word-val" class="hover:underline"></span>
                        </div>
                        <div id="idea-sent" class="text-sm font-jp leading-relaxed mb-3 text-custom-dark"></div>
                        <div id="idea-zh" class="text-[10px] text-slate-400 italic font-jp"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="glass-panel flex flex-col max-h-[550px]">
            <div class="p-6 pb-4 flex justify-between items-center">
                <div class="flex items-center gap-2"><h2 class="text-2xl italic-title">Challenge</h2><i data-lucide="sparkle" class="w-3.5 h-3.5 opacity-30 text-blue-400"></i></div>
                <button onclick="getQuiz()" id="quiz-btn" class="text-[10px] bg-white border border-blue-200 px-4 py-1.5 rounded-full hover:bg-[#badcad] hover:text-white transition-all uppercase tracking-widest italic">New Mission</button>
            </div>
            <div class="px-6 mb-4 flex flex-wrap gap-2 justify-center">
                <button onclick="currentMode='N3'; updateTypeUI(this,'level-btn')" class="level-btn italic">N3</button>
                <button onclick="currentMode='N2'; updateTypeUI(this,'level-btn')" class="level-btn active italic">N2</button>
                <button onclick="currentMode='N1'; updateTypeUI(this,'level-btn')" class="level-btn italic">N1</button>
                <button onclick="currentMode='Nuance'; updateTypeUI(this,'level-btn')" class="level-btn italic">Nuance</button>
            </div>
            <div class="flex-1 overflow-y-auto inner-scroll p-6 space-y-4" id="quiz-container"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 w-full glass-header rounded-t-[2.5rem] px-6 py-4 pb-8 z-50">
        <div id="record-list" class="flex gap-2 overflow-x-auto pb-2 inner-scroll whitespace-nowrap text-[9px] w-full px-2 font-jp opacity-70 italic"></div>
    </footer>

    <script>
        lucide.createIcons();
        let currentMode = "N2";
        let seenWords = new Set(JSON.parse(localStorage.getItem('seen_words') || '[]'));
        const themes = ["Aesthetics", "Ethics", "Phenomenology", "Semiotics", "Metaphysics", "Sociology", "Poetics"];

        const apiKey = () => document.getElementById('api-key').value || localStorage.getItem('ds_key');

        async function ai(prompt) {
            if(!apiKey()) { alert("Please provide an API Key."); return null; }
            try {
                const r = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey()}`},
                    body: JSON.stringify({ model: "deepseek-chat", messages: [{role: "system", content: prompt}], response_format: {type: "json_object"}})
                });
                const d = await r.json();
                return JSON.parse(d.choices[0].message.content);
            } catch(e) { return null; }
        }

        function updateTypeUI(btn, cls) {
            document.querySelectorAll('.'+cls).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function searchWord(w) {
            const q = w || document.getElementById('search-in').value; if(!q) return;
            document.getElementById('search-in').value = q;
            const grid = document.getElementById('nodes-grid'), exArea = document.getElementById('example-area');
            grid.innerHTML = '<div class="text-[10px] opacity-40 animate-pulse py-10 text-center uppercase tracking-[0.2em] italic">Tracing Semantic Pathways...</div>';
            exArea.innerHTML = '';
            document.getElementById('discovery-scroll').scrollTo({top:0, behavior:'smooth'});

            const prompt = `JSON. Input: "${q}". Provide 8 Japanese words. 
            Composition: 2 Near-synonyms, 2 Synonyms, 2 Antonyms, 2 Theme-related.
            Format: {"words":[{"w":"Kanji","r":"Reading","m":"Meaning","type":"Category_EN"}]}`;

            const res = await ai(prompt);
            if(!res || !res.words) { grid.innerHTML = ''; return; }
            grid.innerHTML = '';
            res.words.forEach(n => {
                const div = document.createElement('div');
                div.className = "glass-card p-4 animate-fade-in relative font-jp hover:border-blue-400 cursor-pointer group mb-1";
                div.onclick = () => searchWord(n.w); 
                div.innerHTML = `
                    <div class="text-[8px] absolute top-2 right-3 text-blue-300 opacity-60 uppercase tracking-widest italic">${n.type}</div>
                    <div class="text-xl mb-1" style="color: #474a4d;">
                        <ruby class="hover:text-blue-500 transition-colors" onclick="event.stopPropagation(); getExample('${n.w}')">
                            ${n.w}<rt>${n.r}</rt>
                        </ruby>
                    </div>
                    <p class="text-[10px] text-slate-500 leading-relaxed italic">${n.m}</p>`;
                grid.appendChild(div);
            });
            addRec("Trace", q);
        }

        async function getExample(w) {
            const exArea = document.getElementById('example-area');
            const loading = document.createElement('div');
            loading.className = "text-[10px] opacity-40 animate-pulse py-2 text-center italic";
            loading.innerText = `Decoding context for "${w}"...`;
            exArea.prepend(loading);

            const prompt = `JSON. One JLPT N1-level complex sentence for "${w}". 
            IMPORTANT: Use <ruby> tags for ALL Kanji in "jp". Translate "zh" to Chinese.
            {"jp":"HTML with ruby tags","zh":"..."}`;
            
            const res = await ai(prompt);
            loading.remove();
            if(!res) return;
            const div = document.createElement('div');
            div.className = "glass-card p-5 border-dashed border-blue-200 border animate-fade-in font-jp mb-4";
            div.innerHTML = `<div class="text-[9px] text-blue-400 mb-2 uppercase tracking-widest font-medium italic">Advanced Syntax: ${w}</div>
                             <p class="text-[15px] mb-2 leading-relaxed" style="color: #474a4d;">${res.jp}</p>
                             <p class="text-[10px] text-slate-400 italic">${res.zh}</p>`;
            exArea.prepend(div);
        }

        async function getIdea() {
            const theme = themes[Math.floor(Math.random() * themes.length)];
            const icon = document.getElementById('idea-icon'); icon.classList.add('animate-spin');
            const avoid = Array.from(seenWords).slice(-30).join(',');
            
            const prompt = `JSON. Theme: "${theme}". Pick a unique high-level Japanese term. Avoid: [${avoid}]. 
            Return "word", "sent" (MUST use <ruby> tags for all Kanji), and "zh" translation.
            {"word":"...","sent":"...","zh":"..."}`;
            
            const res = await ai(prompt);
            icon.classList.remove('animate-spin');
            if(res) {
                seenWords.add(res.word);
                localStorage.setItem('seen_words', JSON.stringify(Array.from(seenWords)));
                document.getElementById('idea-word-val').innerText = res.word;
                document.getElementById('idea-sent').innerHTML = res.sent;
                document.getElementById('idea-zh').innerText = res.zh;
                document.getElementById('idea-res').classList.remove('hidden');
                
                document.getElementById('idea-card-node').onclick = (e) => {
                    if(e.target.closest('#idea-word')) getExample(res.word);
                    else searchWord(res.word);
                };
                addRec("Inspo", res.word);
            }
        }

        async function getQuiz() {
            const btn = document.getElementById('quiz-btn'); btn.innerText = "Transmitting...";
            let prompt = "";
            if(currentMode === "Nuance") {
                prompt = `JSON. Nuance analysis mission. Sentence with [BLANK]. Two similar Japanese words (A & B). {"q":"...","A":"...","B":"...","ans":"A or B","expl":"Nuance explanation in English"}`;
            } else {
                prompt = `JSON. JLPT ${currentMode} Reading mission. One Kanji as "[BLANK]". User fills HIRAGANA. {"q":"...","target":"Kanji","ans":"Hiragana","hint":"English definition"}`;
            }
            const res = await ai(prompt);
            btn.innerText = "New Mission";
            if(!res) return;
            const id = Date.now();
            const div = document.createElement('div');
            div.className = "glass-card p-5 animate-fade-in font-jp mb-4";
            
            if(currentMode === "Nuance") {
                div.innerHTML = `<div class="flex justify-between items-start mb-4 text-[9px] uppercase tracking-widest text-blue-500 italic">Nuance Investigation</div>
                    <div class="text-base mb-6" style="color: #474a4d;">${res.q.replace('[BLANK]', ' ( ? ) ')}</div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button onclick="evalNuance('${id}','A','${res.ans}','${res.expl}')" class="py-2 bg-white border border-blue-100 rounded-xl text-sm hover:bg-blue-50 italic">A. ${res.A}</button>
                        <button onclick="evalNuance('${id}','B','${res.ans}','${res.expl}')" class="py-2 bg-white border border-blue-100 rounded-xl text-sm hover:bg-blue-50 italic">B. ${res.B}</button>
                    </div>
                    <div id="res-${id}" class="hidden text-[11px] p-3 bg-blue-50 rounded-lg text-blue-600 leading-relaxed italic"></div>`;
            } else {
                div.innerHTML = `<div class="flex justify-between items-start mb-4 text-[9px] uppercase tracking-widest text-blue-400 italic">
                        ${currentMode} Mastery Challenge
                        <span class="text-slate-400 ml-4 font-normal not-italic">${res.target}: ${res.hint}</span>
                    </div>
                    <div class="text-base mb-6 leading-relaxed" style="color: #474a4d;">${res.q.replace('[BLANK]', `<input id="in-${id}" class="mx-1 w-24 border-b border-blue-200 text-center text-blue-500 italic" placeholder="kana">`)}</div>
                    <div class="flex justify-between items-center border-t border-blue-50 pt-3">
                        <button onclick="evalReading('${id}','${res.ans}')" class="text-[10px] bg-[#badcad] text-white px-4 py-2 rounded-full font-medium uppercase italic">Verify</button>
                        <div id="res-${id}" class="hidden text-blue-500 font-medium text-sm italic"></div>
                    </div>`;
            }
            document.getElementById('quiz-container').prepend(div);
        }

        function evalReading(id, ans) {
            const val = document.getElementById(`in-${id}`).value.trim();
            const box = document.getElementById(`res-${id}`);
            box.innerHTML = (val === ans) ? `✓ Accurate: ${ans}` : `✗ Deviant: ${ans}`;
            box.classList.remove('hidden');
        }

        function evalNuance(id, choice, ans, expl) {
            const box = document.getElementById(`res-${id}`);
            box.innerHTML = (choice === ans) ? `Insightful! ${expl}` : `Misinterpreted. ${expl}`;
            box.classList.remove('hidden');
        }

        function addRec(type, content) {
            const span = document.createElement('span');
            span.className = "bg-white border border-blue-100 px-3 py-1 rounded-full text-[9px] flex-shrink-0 animate-fade-in italic";
            span.innerText = `${type}: ${content}`;
            document.getElementById('record-list').prepend(span);
        }

        function resetMemory() { if(confirm("Erase all semantic memory?")) { localStorage.clear(); location.reload(); } }
        window.onload = () => { if(localStorage.getItem('ds_key')) document.getElementById('api-key').value = localStorage.getItem('ds_key'); }
    </script>
</body></html>
